name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Build (static)
        env:
          # base = /<nazev-repa>/ ; pro vlastni domenu smaz tento radek (base bude "/")
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build
      - name: SPA fallback + .nojekyll
        run: |
          cp .output/public/index.html .output/public/404.html || true
          touch .output/public/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
