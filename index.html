<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salon System — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0f0e0c;
      --surface: #1a1916;
      --card:    #242220;
      --border:  rgba(255,255,255,0.08);
      --fg:      #f0ebe0;
      --muted:   #7a7468;
      --accent-b:#37432f;
      --accent-s:#a8a29e;
      --green:   #4ade80;
      --gold:    #d4af37;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 300;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    /* ── Header ── */
    .topbar {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      background: var(--surface);
    }
    .topbar-logo {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--fg);
    }
    .topbar-logo span { color: var(--gold); }
    .topbar-meta {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Main ── */
    .main { max-width: 1200px; margin: 0 auto; padding: 3rem 2rem 6rem; }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 3rem;
    }
    .stat-cell {
      background: var(--surface);
      padding: 1.5rem;
      text-align: center;
    }
    .stat-num {
      font-size: 2rem;
      font-weight: 600;
      color: var(--fg);
      display: block;
    }
    .stat-lbl {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 0.25rem;
    }

    /* ── Section headings ── */
    .section-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Site grid ── */
    .sites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    /* ── Site card ── */
    .site-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
      display: flex;
      flex-direction: column;
    }
    .site-card:hover { border-color: rgba(255,255,255,0.18); transform: translateY(-2px); }
    .site-card-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .template-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .badge-barbershop { background: rgba(55,67,47,0.5); color: #8fa97e; border: 1px solid rgba(55,67,47,0.8); }
    .badge-salon      { background: rgba(168,162,158,0.15); color: #c5bfbb; border: 1px solid rgba(168,162,158,0.3); }
    .site-slug {
      font-size: 0.75rem;
      color: var(--muted);
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .site-card-body { padding: 1.5rem; flex: 1; }
    .site-name {
      font-size: 1.15rem;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 0.25rem;
    }
    .site-city { font-size: 0.8rem; color: var(--muted); margin-bottom: 1rem; }
    .site-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.25rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .site-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }
    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.2rem 0.6rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 0.65rem;
      color: var(--muted);
    }
    .site-card-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }
    .btn-open {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      background: var(--fg);
      color: var(--bg);
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn-open:hover { background: #ddd7cc; }
    .btn-config {
      padding: 0.85rem 1.1rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
      white-space: nowrap;
    }
    .btn-config:hover { border-color: rgba(255,255,255,0.2); color: var(--fg); }

    /* ── Loading state ── */
    .card-loading {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 1.5px solid var(--border);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Color dots ── */
    .color-dots { display: flex; gap: 4px; }
    .color-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1px solid rgba(0,0,0,0.2);
    }

    /* ── Add new site CTA ── */
    .add-card {
      background: transparent;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 0.75rem;
      min-height: 200px;
      cursor: default;
    }
    .add-icon { font-size: 1.5rem; color: var(--muted); }
    .add-title { font-size: 0.875rem; font-weight: 500; color: var(--muted); }
    .add-hint { font-size: 0.75rem; color: var(--muted); opacity: 0.6; max-width: 24ch; line-height: 1.6; }

    /* ── Footer ── */
    .dash-footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-logo">Salon <span>System</span> — Dashboard</div>
  <div class="topbar-meta" id="topbar-meta">Načítání…</div>
</header>

<main class="main">
  <div class="stats-row" id="stats-row">
    <div class="stat-cell">
      <span class="stat-num" id="total-sites">—</span>
      <span class="stat-lbl">Celkem webů</span>
    </div>
    <div class="stat-cell">
      <span class="stat-num" id="barbershop-count">—</span>
      <span class="stat-lbl">Barbershop</span>
    </div>
    <div class="stat-cell">
      <span class="stat-num" id="salon-count">—</span>
      <span class="stat-lbl">Salon</span>
    </div>
    <div class="stat-cell">
      <span class="stat-num">2</span>
      <span class="stat-lbl">Šablony</span>
    </div>
  </div>

  <div class="section-title">Aktivní weby</div>
  <div class="sites-grid" id="sites-grid">
    <!-- Populated by JS -->
  </div>
</main>

<footer class="dash-footer">
  Salon System · Šablony: <code>barbershop/template/</code> a <code>salon/template/</code> ·
  Konfigurace: <code>sites/[slug]/config.json</code>
</footer>

<script>
/* ═══════════════════════════════════════════════════════════
   DASHBOARD — Loads all site configs and renders cards
   ═══════════════════════════════════════════════════════════ */

const SITES = [
  { slug: 'velvet-chrome',      template: 'barbershop' },
  { slug: 'barber-gold',        template: 'barbershop' },
  { slug: 'gabriela-cilova',    template: 'salon'      },
  { slug: 'studio-luna',        template: 'salon'      },
  { slug: 'erika-pulc',         template: 'barbershop' },
  { slug: 'ht-salon',           template: 'barbershop' },
  { slug: 'muj-novy-barbershop',template: 'barbershop' },
];

const TEMPLATE_LABELS = {
  barbershop: 'Barbershop',
  salon:      'Salon',
};

function colorDots(colors) {
  if (!colors) return '';
  const keys = ['background','accent','chrome','cream'].filter(k => colors[k]);
  if (!keys.length) return '';
  return '<div class="color-dots">' +
    keys.map(k => `<div class="color-dot" style="background:${colors[k]}" title="${k}: ${colors[k]}"></div>`).join('') +
    '</div>';
}

async function loadSite(slug, template) {
  const res = await fetch(`./sites/${slug}/config.json`);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

async function renderDashboard() {
  const grid = document.getElementById('sites-grid');

  grid.innerHTML = SITES.map(() =>
    `<div class="card-loading"><div class="spinner"></div></div>`
  ).join('') + `
  <div class="add-card">
    <div class="add-icon">＋</div>
    <div class="add-title">Přidat nový web</div>
    <div class="add-hint">Viz README.md — nový web za 5 minut</div>
  </div>`;

  const results = await Promise.allSettled(
    SITES.map(s => loadSite(s.slug, s.template))
  );

  const cards = SITES.map((site, i) => {
    const result = results[i];
    if (result.status === 'rejected') {
      return `<div class="site-card">
        <div class="site-card-header">
          <span class="template-badge badge-${site.template}">${TEMPLATE_LABELS[site.template] || site.template}</span>
          <span class="site-slug">${site.slug}</span>
        </div>
        <div class="site-card-body">
          <div class="site-name" style="color:#7a7468">Config nenalezen</div>
          <div class="site-city" style="font-family:monospace;font-size:.75rem">sites/${site.slug}/config.json</div>
          <div class="site-desc" style="color:#ef4444">${result.reason?.message || 'Chyba'}</div>
        </div>
      </div>`;
    }

    const cfg = result.value;
    const b   = cfg.business || {};
    const col = cfg.colors   || {};
    const contact = cfg.contact || {};

    const metaPills = [];
    if (contact.city || b.city) metaPills.push(`📍 ${contact.city || b.city}`);
    if (contact.phone)          metaPills.push(`📞 ${contact.phone}`);
    if (cfg.services?.length)   metaPills.push(`✂️ ${cfg.services.length} služeb`);

    return `<div class="site-card">
      <div class="site-card-header">
        <span class="template-badge badge-${site.template}">${TEMPLATE_LABELS[site.template] || site.template}</span>
        <span class="site-slug">sites/${site.slug}/</span>
      </div>
      <div class="site-card-body">
        <div class="site-name">${b.name || site.slug}</div>
        <div class="site-city">${b.city || ''}</div>
        <div class="site-desc">${b.description || b.tagline || ''}</div>
        <div class="site-meta">
          ${metaPills.map(p => `<span class="meta-pill">${p}</span>`).join('')}
          ${colorDots(col)}
        </div>
      </div>
      <div class="site-card-footer">
        <button class="btn-open" onclick="openSite('${site.template}', '${site.slug}')">
          ↗ Otevřít náhled
        </button>
        <button class="btn-config" onclick="openConfig('${site.slug}')">
          config.json
        </button>
      </div>
    </div>`;
  });

  const addCard = `
  <div class="add-card">
    <div class="add-icon">＋</div>
    <div class="add-title">Přidat nový web</div>
    <div class="add-hint">Viz README.md — nový web za 5 minut</div>
  </div>`;

  grid.innerHTML = cards.join('') + addCard;

  const loaded = results.filter(r => r.status === 'fulfilled').length;
  const barbershops = SITES.filter((s, i) => s.template === 'barbershop' && results[i].status === 'fulfilled').length;
  const salons      = SITES.filter((s, i) => s.template === 'salon'      && results[i].status === 'fulfilled').length;

  document.getElementById('total-sites').textContent     = loaded;
  document.getElementById('barbershop-count').textContent = barbershops;
  document.getElementById('salon-count').textContent      = salons;
  document.getElementById('topbar-meta').textContent      =
    `${loaded} weby aktivní · ${new Date().toLocaleDateString('cs-CZ')}`;
}

function openSite(template, slug) {
  const standaloneUrl = `./sites/${slug}/index.html`;
  const templateUrl   = `./${template}/template/index.html`;
  fetch(standaloneUrl, { method: 'HEAD' })
    .then(r => {
      if (r.ok) window.open(standaloneUrl, '_blank');
      else      window.open(templateUrl,   '_blank');
    })
    .catch(() => window.open(templateUrl, '_blank'));
}

function openConfig(slug) {
  window.open(`./sites/${slug}/config.json`, '_blank');
}

renderDashboard();
</script>
</body>
</html>
