name: Deploy salon-system to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: stationery-haven/package.json

      - name: Install dependencies
        working-directory: stationery-haven
        run: npm install

      - name: Build stationery-haven
        working-directory: stationery-haven
        run: npx vite build --base=/salon-system/stationery-haven/

      - name: Assemble site (dashboard + demo sites + built app)
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r sites _site/sites
          cp -r barbershop _site/barbershop
          cp -r salon _site/salon
          cp -r dentist _site/dentist
          mkdir -p _site/stationery-haven
          cp -r stationery-haven/dist/. _site/stationery-haven/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
